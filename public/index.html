<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PAES M1 Trainer</title>
</head>
<body style="font-family: Arial; padding: 20px;">

<h1>PAES M1 Trainer 🚀</h1>
<p id="progress"></p>

<div id="app"></div>

<button onclick="next()">Siguiente semana</button>

<script>
let week = 0;
let score = 0;

const lessons = [

  {
    title: "Semana 1 - Porcentajes",
    theory: "El porcentaje representa una parte de 100. Ej: 20% = 20/100",
    question: "Un producto cuesta $5000 y tiene 10% de descuento. ¿Precio final?",
    options: ["4500", "4000", "4800"],
    answer: 0
  },

  {
    title: "Semana 2 - Fracciones",
    theory: "Las fracciones representan partes de un todo. 1/2 = 0.5",
    question: "¿Cuál es 3/4 en decimal?",
    options: ["0.25", "0.75", "0.5"],
    answer: 1
  },

  {
    title: "Semana 3 - Razones",
    theory: "Una razón compara dos cantidades. Ej: 2:1",
    question: "Si 2 lápices cuestan $100, ¿cuánto cuestan 6?",
    options: ["200", "300", "400"],
    answer: 1
  },

  {
    title: "Semana 4 - Problemas",
    theory: "Aplicación de porcentajes en la vida real",
    question: "Aumentar 20% a 200 → ¿resultado?",
    options: ["220", "240", "260"],
    answer: 1
  },

  {
    title: "Semana 5 - Álgebra",
    theory: "Uso de letras para representar números",
    question: "Si x + 5 = 12, x = ?",
    options: ["5", "7", "12"],
    answer: 1
  },

  {
    title: "Semana 6 - Ecuaciones",
    theory: "Resolver ecuaciones es despejar incógnitas",
    question: "2x = 14 → x = ?",
    options: ["6", "7", "8"],
    answer: 1
  },

  {
    title: "Semana 7 - Sistemas",
    theory: "Resolver dos ecuaciones con dos incógnitas",
    question: "x + y = 10, x = 4 → y = ?",
    options: ["4", "5", "6"],
    answer: 2
  },

  {
    title: "Semana 8 - Modelación",
    theory: "Traducir problemas a ecuaciones",
    question: "Edad doble de otra: si x=5, total = ?",
    options: ["10", "15", "20"],
    answer: 1
  },

  {
    title: "Semana 9 - Función lineal",
    theory: "y = mx + b",
    question: "y = 2x + 1, x = 3 → y = ?",
    options: ["6", "7", "8"],
    answer: 1
  },

  {
    title: "Semana 10 - Gráficos",
    theory: "Interpretar gráficos",
    question: "Pendiente de y = 3x + 2",
    options: ["2", "3", "5"],
    answer: 1
  },

  {
    title: "Semana 11 - Pendiente",
    theory: "m indica crecimiento",
    question: "Si m es negativa, la recta:",
    options: ["sube", "baja", "es horizontal"],
    answer: 1
  },

  {
    title: "Semana 12 - Aplicaciones",
    theory: "Problemas con funciones",
    question: "y = x + 5, x = 10 → y = ?",
    options: ["10", "15", "20"],
    answer: 1
  },

  {
    title: "Semana 13 - Geometría",
    theory: "Área = base × altura",
    question: "Rectángulo 5x4 → área?",
    options: ["20", "15", "25"],
    answer: 0
  },

  {
    title: "Semana 14 - Pitágoras",
    theory: "a² + b² = c²",
    question: "Catetos 3 y 4 → hipotenusa?",
    options: ["5", "6", "7"],
    answer: 0
  },

  {
    title: "Semana 15 - Estadística",
    theory: "Promedio = suma / cantidad",
    question: "Promedio de 2,4,6",
    options: ["3", "4", "5"],
    answer: 1
  },

  {
    title: "Semana 16 - Probabilidad",
    theory: "Casos favorables / total",
    question: "Moneda → probabilidad cara?",
    options: ["1/2", "1/3", "1"],
    answer: 0
  }

];

function render() {
  const l = lessons[week];

  document.getElementById("progress").innerText =
    `Semana ${week + 1} de 16 | Puntaje: ${score}`;

  document.getElementById("app").innerHTML = `
    <h2>${l.title}</h2>
    <p><b>Contenido:</b> ${l.theory}</p>

    <p><b>Pregunta:</b> ${l.question}</p>

    ${l.options.map((opt, i) =>
      `<button onclick="answer(${i})">${opt}</button>`
    ).join("<br><br>")}
  `;
}

function answer(i) {
  if (i === lessons[week].answer) {
    alert("✅ Correcto");
    score++;
  } else {
    alert("❌ Incorrecto");
  }
}

function next() {
  week = (week + 1) % lessons.length;
  render();
}

render();
</script>

</body>
</html>
